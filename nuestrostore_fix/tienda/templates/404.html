{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Página no encontrada · NuestroStore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;padding-bottom:0;}
  .e404-wrap{max-width:480px;margin:0 auto;}
  .e404-code{font-family:'Bebas Neue',cursive;font-size:clamp(6rem,20vw,10rem);line-height:1;background:linear-gradient(135deg,var(--na3),var(--am));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .e404-ico{font-size:4rem;margin-bottom:8px;animation:float404 3s ease-in-out infinite;}
  @keyframes float404{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
  .e404-title{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:2px;color:var(--bk);margin-bottom:10px;}
  .e404-sub{color:var(--gr);font-size:.95rem;font-weight:600;line-height:1.55;margin-bottom:28px;}
  .e404-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .e404-btn{padding:13px 28px;border-radius:12px;font-weight:900;font-size:.9rem;text-decoration:none;transition:transform .18s,box-shadow .18s;display:inline-flex;align-items:center;gap:7px;}
  .e404-btn-p{background:linear-gradient(135deg,var(--na3),var(--na2));color:#fff;box-shadow:0 4px 14px rgba(255,109,0,.3);}
  .e404-btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,109,0,.4);}
  .e404-btn-s{background:#fff;color:var(--na3);border:2px solid var(--na2);}
  .e404-btn-s:hover{background:#fff8e1;}
</style>
</head>
<body>
  <div class="e404-wrap">
    <div class="e404-ico">🛒</div>
    <div class="e404-code">404</div>
    <div class="e404-title">Página No Encontrada</div>
    <p class="e404-sub">Ups, parece que este producto voló del carrito.<br/>La página que buscas no existe o fue movida.</p>
    <div class="e404-btns">
      <a class="e404-btn e404-btn-p" href="/">🏠 Ir al Inicio</a>
      <a class="e404-btn e404-btn-s" href="javascript:history.back()">← Volver</a>
    </div>
  </div>
</body>
</html>
